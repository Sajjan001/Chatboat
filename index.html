<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmaan Chatboat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a2342 0%, #1a4d7a 50%, #0d3b66 100%);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: #0d3b66;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #4a90e2;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0a2342 0%, #164863 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #4a90e2;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .header p {
            color: #b3d9ff;
            font-size: 0.9em;
            margin: 5px 0 0 0;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(135deg, #164863 0%, #0d3b66 100%);
        }

        .chat-box::-webkit-scrollbar {
            width: 8px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: #0d3b66;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #4a90e2;
            border-radius: 4px;
        }

        .message-group {
            display: flex;
            margin: 12px 0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-group.user {
            justify-content: flex-end;
        }

        .message-group.bot {
            justify-content: flex-start;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user-msg {
            background: #ffeb3b;
            color: #1a1a1a;
            border: 2px solid #ff9800;
            font-weight: 600;
        }

        .message.bot-msg {
            background: #1e88e5;
            color: #ffffff;
            border: 2px solid #42a5f5;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #b3d9ff;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .thinking-container {
            background: #1e88e5;
            border: 2px solid #42a5f5;
            border-radius: 15px;
            margin: 12px 0;
            overflow: hidden;
        }

        .thinking-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #1565c0;
            color: #ffeb3b;
            font-weight: 600;
            user-select: none;
        }

        .thinking-header:hover {
            background: #1e88e5;
        }

        .thinking-toggle {
            display: inline-block;
            transition: transform 0.3s;
        }

        .thinking-toggle.open {
            transform: rotate(90deg);
        }

        .thinking-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #164863;
            color: #b3d9ff;
            font-size: 14px;
            line-height: 1.6;
        }

        .thinking-content.open {
            max-height: 300px;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .thinking-step {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }

        .thinking-step::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #ffeb3b;
        }

        .input-section {
            padding: 15px;
            background: #164863;
            border-top: 3px solid #4a90e2;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #4a90e2;
            border-radius: 20px;
            background: #0d3b66;
            color: #ffeb3b;
            font-size: 14px;
            font-family: inherit;
        }

        input::placeholder {
            color: #4a90e2;
        }

        input:focus {
            outline: none;
            border: 2px solid #ffeb3b;
        }

        button {
            padding: 10px 20px;
            background: #ffeb3b;
            color: #1a1a1a;
            border: 2px solid #ff9800;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #ffc107;
        }

        button:active {
            transform: translateY(0);
        }

        #clearBtn {
            background: #e74c3c;
            color: white;
            border: 2px solid #e74c3c;
        }

        #clearBtn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nirmaan Chatboat</h1>
            <p></p>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="empty-state">
                <div class="empty-state-icon">🤖</div>
                <div>Welcome to Chatboat! Start chatting...</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type message...">
                <button id="sendBtn">Send</button>
            </div>
            <button id="clearBtn">Clear</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearChat);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            if (chatBox.querySelector('.empty-state')) {
                chatBox.innerHTML = '';
            }

            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.focus();

            showProcessing();

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                removeProcessing();
                if (data.success) {
                    setTimeout(() => {
                        addMessage(data.response, 'bot');
                    }, 500);
                } else {
                    addMessage('Error: ' + data.error, 'bot');
                }
            })
            .catch(err => {
                removeProcessing();
                addMessage('Connection error!', 'bot');
            });
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message-group ${sender}`;
            div.innerHTML = `<div class="message ${sender}-msg">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showProcessing() {
            const div = document.createElement('div');
            div.className = 'message-group bot';
            div.id = 'processing';
            div.innerHTML = `<div style="padding: 12px 16px; background: #1e88e5; border: 2px solid #42a5f5; border-radius: 15px; color: #ffeb3b; font-weight: 600;">🤔 Thinking...</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeProcessing() {
            const processing = document.getElementById('processing');
            if (processing) processing.remove();
        }

        function clearChat() {
            if (confirm('Clear chat?')) {
                chatBox.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤖</div></div>';
                fetch('/api/clear', { method: 'POST' });
            }
        }
    </script>
</body>
</html>
